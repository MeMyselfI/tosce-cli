name: Release Native Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tosce
            asset_name: tosce-linux-amd64
          - os: macos-14
            artifact_name: tosce
            asset_name: tosce-macos-arm64
          - os: windows-latest
            artifact_name: tosce.exe
            asset_name: tosce-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Build native image
        run: mvn -Pnative -DskipTests package --no-transfer-progress

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv target/tosce target/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target\tosce.exe target\${{ matrix.asset_name }}
        shell: cmd

      - name: Create .desktop file (Linux)
        if: runner.os == 'Linux'
        run: |
          cat > target/tosce.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=tOSCE CLI
          Comment=GUI for the tOSCE OSCE exam management server
          Exec=tosce --gui
          Terminal=false
          Categories=Utility;
          EOF

      - name: Upload .desktop file (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tosce-desktop
          path: target/tosce.desktop
          if-no-files-found: error

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y --no-progress
        shell: cmd

      - name: Compress with UPX (Linux/Windows)
        if: runner.os != 'macOS'
        run: upx --best target/${{ matrix.asset_name }}

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p tOSCE\ CLI.app/Contents/MacOS
          cp target/tosce-macos-arm64 tOSCE\ CLI.app/Contents/MacOS/tosce
          chmod +x tOSCE\ CLI.app/Contents/MacOS/tosce
          cat > tOSCE\ CLI.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>tosce</string>
              <key>CFBundleIdentifier</key>
              <string>de.agentsinaction.tosce</string>
              <key>CFBundleName</key>
              <string>tOSCE CLI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF
          zip -r target/tosce-macos-arm64.app.zip tOSCE\ CLI.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload .app bundle (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tosce-macos-arm64-app
          path: target/tosce-macos-arm64.app.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: tOSCE CLI ${{ github.ref_name || github.event.inputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/tosce-linux-amd64/tosce-linux-amd64
            artifacts/tosce-desktop/tosce.desktop
            artifacts/tosce-macos-arm64/tosce-macos-arm64
            artifacts/tosce-macos-arm64-app/tosce-macos-arm64.app.zip
            artifacts/tosce-windows-amd64.exe/tosce-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
